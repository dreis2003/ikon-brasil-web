name: Deploy PRD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dreis2003/ikon-brasil-web

jobs:
  build-and-push:
    name: Build and Push Docker Image PRD
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build:prd

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:prd-${{ github.sha }} \
            -t $IMAGE_NAME:prd-latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:prd-${{ github.sha }}
          docker push $IMAGE_NAME:prd-latest
